name: VTuber Original Short (Repo Save)

# ──────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────
on:
  # Run automatically every day at 14:00 UTC (1 hour after the original-short workflow)
  schedule:
    - cron: "0 14 * * *"

  # Trigger manually from the Actions tab with an optional topic hint
  workflow_dispatch:
    inputs:
      custom_topic:
        description: "Optional topic hint for the AI (leave blank for autonomous choice)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-and-save:
    name: Render Original Miku & Save to Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install FFmpeg, fonts, and Xvfb (virtual framebuffer for headless Chrome)
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/microsoft-prod.list.save
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-noto \
            xvfb \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2

      - name: Verify FFmpeg
        run: ffmpeg -version | head -1

      # ── Node.js (for Puppeteer / Live2D capture) ────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer and Live2D front-end libraries
        run: |
          npm install puppeteer pixi.js@6 pixi-live2d-display@0.4.0
        working-directory: ${{ github.workspace }}

      - name: Download Live2D Cubism Core SDK
        run: |
          mkdir -p scripts/vendor
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js" \
            -o scripts/vendor/live2dcubismcore.min.js
        working-directory: ${{ github.workspace }}

      # ── Python (for TTS, music, video composition) ───────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Generate and save ────────────────────────────────────────────────
      - name: Generate original VTuber short and save to repository
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          CUSTOM_TOPIC: ${{ inputs.custom_topic }}
          # Tell Puppeteer where Chromium is (installed by npm install puppeteer)
          PUPPETEER_EXECUTABLE_PATH: ""
        run: python scripts/generate_original_short_repo.py

      # Commit the video and log (always runs, even on partial failure)
      - name: Commit video and log to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ logs/ cache/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: auto-save original-vtuber video to repository [skip ci]"
            git push
          fi
