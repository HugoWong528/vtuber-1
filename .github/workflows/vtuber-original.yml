name: VTuber Original Short

# ──────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────
on:
  # Run automatically every day at 13:00 UTC (1 hour after the AI-image workflow)
  schedule:
    - cron: "0 13 * * *"

  # Trigger manually from the Actions tab with an optional topic hint
  workflow_dispatch:
    inputs:
      custom_topic:
        description: "Optional topic hint for the AI (leave blank for autonomous choice)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-and-upload:
    name: Render Original Miku & Upload to YouTube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install FFmpeg, fonts, and Xvfb (virtual framebuffer for headless Chrome)
      - name: Install system dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/microsoft-prod.list.save
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-noto \
            xvfb \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2

      - name: Verify FFmpeg
        run: ffmpeg -version | head -1

      # ── Node.js (for Puppeteer / Live2D capture) ────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Puppeteer
        run: |
          # Install Puppeteer (downloads Chromium automatically)
          npm install puppeteer
        working-directory: ${{ github.workspace }}

      # ── Python (for TTS, music, video composition, YouTube upload) ───────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Generate and upload ──────────────────────────────────────────────
      - name: Generate original VTuber short and upload to YouTube
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CUSTOM_TOPIC: ${{ inputs.custom_topic }}
          # Tell Puppeteer where Chromium is (installed by npm install puppeteer)
          PUPPETEER_EXECUTABLE_PATH: ""
        run: python scripts/generate_original_short.py

      # Commit the video backup and log even if the YouTube upload step failed
      - name: Commit video backup and log to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: auto-backup original-vtuber video and update upload log [skip ci]"
            git push
          fi
