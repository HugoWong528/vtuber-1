name: VTuber Auto-Short

# ──────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────
on:
  # Run automatically every day at 12:00 UTC (noon)
  schedule:
    - cron: "0 12 * * *"

  # Trigger manually from the Actions tab (optionally override the topic)
  workflow_dispatch:
    inputs:
      custom_topic:
        description: "Optional topic hint for the AI (leave blank for autonomous choice)"
        required: false
        default: ""

# ──────────────────────────────────────────────────────────────────────────
# Permissions — read-only on the repo is enough; no write needed here
# ──────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:
  generate-and-upload:
    name: Generate Short & Upload to YouTube
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo (we need texture_00.png as the avatar)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. FFmpeg is pre-installed on ubuntu-latest; confirm it's available
      - name: Verify FFmpeg
        run: ffmpeg -version | head -1

      # 3. Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # 4. Install Python dependencies
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # 5. Run the generation + upload script
      #    All secrets are injected as environment variables.
      #    CUSTOM_TOPIC is forwarded so the script can optionally use it.
      - name: Generate short video and upload to YouTube
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CUSTOM_TOPIC: ${{ inputs.custom_topic }}
        run: python scripts/generate_short.py
