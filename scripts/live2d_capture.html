<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miku Capture</title>

  <!-- Live2D Cubism 4 Core -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <!-- PIXI.js v6 -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display cubism4 build -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
    #canvas { display: block; width: 1080px; height: 1920px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
// Model path — served from the repo root by the local HTTP server
const MODEL_PATH = '/miku_sample_t04.model3.json';

// Signals for Puppeteer to poll
window.modelReady = false;
window.modelError = null;

async function init() {
  const canvas = document.getElementById('canvas');

  const app = new PIXI.Application({
    view: canvas,
    width: 1080,
    height: 1920,
    // Gradient background (anime teal-to-purple), rendered as a solid colour here;
    // real gradient is drawn via a Graphics object below.
    transparent: true,
    antialias: true,
    resolution: 1,
    autoDensity: false,
  });

  // ── Gradient background drawn with Graphics ──────────────────────────────
  const bg = new PIXI.Graphics();
  // Top colour  #1a0533 (dark purple)
  // Bottom colour #00c8a0 (teal)
  // Approximate with rectangles of varying alpha / layered fills
  const gradient = app.renderer.generateTexture(
    (() => {
      const g = new PIXI.Graphics();
      // Use a canvas-based texture for a real gradient
      const cvs = document.createElement('canvas');
      cvs.width = 1080;
      cvs.height = 1920;
      const ctx = cvs.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 1920);
      grad.addColorStop(0, '#1a0533');
      grad.addColorStop(0.5, '#2d1b69');
      grad.addColorStop(1, '#00c8a0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 1920);
      return new PIXI.Sprite(PIXI.Texture.from(cvs));
    })()
  );
  const bgSprite = new PIXI.Sprite(gradient);
  bgSprite.width = 1080;
  bgSprite.height = 1920;
  app.stage.addChild(bgSprite);

  // ── Load and position Live2D model ───────────────────────────────────────
  try {
    const model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
      autoInteract: false,  // no mouse interaction during capture
    });

    app.stage.addChild(model);

    // Fill 90 % of the frame height, centred horizontally, anchored at centre
    const scale = Math.min(
      1080 / model.internalModel.originalWidth,
      1920 / model.internalModel.originalHeight
    ) * 0.92;
    model.scale.set(scale);
    model.x = 1080 / 2;
    model.y = 1920 / 2;
    model.anchor.set(0.5, 0.5);

    // Start idle animation loop
    model.motion('Idle');

    window.modelReady = true;
  } catch (err) {
    window.modelError = err.message || String(err);
    console.error('Live2D load error:', err);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
